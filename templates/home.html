<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 3D Glass Card */
    .container {
        width: 420px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        border: 2px solid rgba(255,255,255,0.2);
        transition: transform 0.4s ease;
    }

    .container:hover {
        transform: rotateX(5deg) rotateY(-5deg) scale(1.02);
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 10px;
    }

    legend {
        text-align: center;
        color: #ddd;
        margin-bottom: 20px;
    }

    label {
        color: #eee;
        font-size: 14px;
    }

    .mb-3 {
        margin-bottom: 15px;
    }

    select, input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.2);
        color: white;
        transition: 0.3s;
    }

    select:hover, input:hover {
        background: rgba(255,255,255,0.3);
    }

    select:focus, input:focus {
        box-shadow: 0 0 10px #6c63ff;
    }

    option {
        color: black;
    }

    /* Gradient Border Button */
    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(45deg, #6c63ff, #a084ee);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #6c63ff;
    }

    /* Loading Spinner */
    .spinner {
        display: none;
        margin: 15px auto;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    .result {
        text-align: center;
        color: #fff;
        margin-top: 20px;
        font-size: 20px;
        font-weight: 600;
    }

    @media(max-width: 500px){
        .container {
            width: 90%;
        }
    }
</style>

<script>
    function showLoader() {
        document.getElementById("spinner").style.display = "block";
    }
</script>

```
<h1>Student Predictor</h1>
<legend>Exam Performance Prediction</legend>

<form action="{{ url_for('predict_datapoint')}}" method="post" onsubmit="showLoader()">

    <div class="mb-3">
        <label>Gender</label>
        <select name="gender" required>
            <option disabled selected>Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Ethnicity</label>
        <select name="ethnicity" required>
            <option disabled selected>Select</option>
            <option value="group A">A</option>
            <option value="group B">B</option>
            <option value="group C">C</option>
            <option value="group D">D</option>
            <option value="group E">E</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Parent Education</label>
        <select name="parental_level_of_education" required>
            <option disabled selected>Select</option>
            <option value="associate's degree">Associate</option>
            <option value="bachelor's degree">Bachelor</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master</option>
            <option value="some college">College</option>
            <option value="some high school">Some HS</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Lunch</label>
        <select name="lunch" required>
            <option disabled selected>Select</option>
            <option value="free/reduced">Free</option>
            <option value="standard">Standard</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Test Course</label>
        <select name="test_preparation_course" required>
            <option disabled selected>Select</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required>
    </div>

    <div class="mb-3">
        <label>Writing Score</label>
        <input type="number" name="writing_score" min="0" max="100" required>
    </div>

    <button class="btn" type="submit">Predict Maths Score</button>

    <div id="spinner" class="spinner"></div>

</form>

<div class="result">
    {{ results }}
</div>
